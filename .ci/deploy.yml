.kube-context:
  before_script:
    - if [ -n "$KUBE_CONTEXT" ]; then kubectl config use-context "$KUBE_CONTEXT"; fi

.deploy-base:
  stage: deploy
  extends: [.kube-context]
  tags:
    - k8s
  # Replace with your own kubectl image
  image:
    name: your-super-registry.example.com/kubectl/kubectl-envsubst:latest
    entrypoint: [""]

deploy-cluster:
  extends: [.deploy-base]
  needs:
    - package-prod
  environment:
    name: production
    url: https://your-super-api-s3.example.com
  script:
    - $KUBECTL create secret docker-registry gitlab-auth
      --docker-server="$HARBOR_REGISTRY_NO_PREFIX"
      --docker-username="$HARBOR_USER"
      --docker-password="$HARBOR_TOKEN"
      --namespace="$K8S_NAMESPACE"
      --dry-run=client -o yaml | $KUBECTL apply -f -
    - >
      $KUBECTL create secret generic api-s3-secrets
      --from-literal=RUST_LOG="${RUST_LOG:-info}"
      --from-literal=USE_S3="true"
      --from-literal=S3_ENDPOINT="$S3_ENDPOINT"
      --from-literal=S3_BUCKET="$S3_BUCKET"
      --from-literal=S3_REGION="eu-west-3"
      --from-literal=S3_ACCESS_KEY="$S3_ACCESS_KEY"
      --from-literal=S3_SECRET_KEY="$S3_SECRET_KEY"
      --namespace="$K8S_NAMESPACE"
      --dry-run=client -o yaml | $KUBECTL apply -f -
    - $KUBECTL apply -k k8s/overlays/production
    - $KUBECTL rollout restart deployment/api-s3-deployment -n $K8S_NAMESPACE || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy-preprod:
  extends: [.deploy-base]
  needs:
    - package-preprod
  environment:
    name: pre-prod
    url: https://your-super-preprod-api-s3.example.com
  script:
    - $KUBECTL create secret docker-registry gitlab-auth
      --docker-server="$HARBOR_REGISTRY_NO_PREFIX"
      --docker-username="$HARBOR_USER"
      --docker-password="$HARBOR_TOKEN"
      --namespace="$PREPROD_K8S_NAMESPACE"
      --dry-run=client -o yaml | $KUBECTL apply -f -
    - >
      $KUBECTL create secret generic api-s3-secrets
      --from-literal=RUST_LOG="${RUST_LOG:-info}"
      --from-literal=USE_S3="true"
      --from-literal=S3_ENDPOINT="$S3_ENDPOINT"
      --from-literal=S3_BUCKET="$S3_BUCKET"
      --from-literal=S3_REGION="eu-west-3"
      --from-literal=S3_ACCESS_KEY="$S3_ACCESS_KEY"
      --from-literal=S3_SECRET_KEY="$S3_SECRET_KEY"
      --namespace="$PREPROD_K8S_NAMESPACE"
      --dry-run=client -o yaml | $KUBECTL apply -f -
    - $KUBECTL apply -k k8s/overlays/pre-prod
    - $KUBECTL rollout restart deployment/api-s3-deployment -n $PREPROD_K8S_NAMESPACE || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'
