apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-s3-ingress
spec:
  rules:
    - host: your-super-preprod-api-s3.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-s3-service
                port:
                  number: 80
